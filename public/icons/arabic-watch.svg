<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Definitions -->
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8962e"/>
      <stop offset="25%" stop-color="#e6c875"/>
      <stop offset="50%" stop-color="#f5e6b3"/>
      <stop offset="75%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8962e"/>
    </linearGradient>
    
    <!-- Blue gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="50%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
    
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Outer decorative ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  
  <!-- Inner decorative ring with dashed pattern -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#1a237e" stroke-width="1.5" 
          stroke-dasharray="6,3" opacity="0.4"/>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="38" fill="#faf8f3"/>
  
  <!-- Islamic geometric pattern - 8-point star -->
  <g opacity="0.15" stroke="#1a237e" stroke-width="0.8" fill="none">
    <path d="M50 12 L88 50 L50 88 L12 50 Z"/>
    <path d="M50 20 L80 50 L50 80 L20 50 Z"/>
    <circle cx="50" cy="50" r="10"/>
  </g>
  
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Center Arabic letter "3" (seen) for Sa'a (hour/time) -->
  <text x="50" y="62" font-family="'Amiri', 'Scheherazade New', serif" 
        font-size="38" font-weight="700" fill="url(#blueGrad)" 
        text-anchor="middle" filter="url(#shadow)">3</text>
  
  <!-- Small tick marks at 12, 3, 6, 9 o'clock positions -->
  <g stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round">
    <line x1="50" y1="6" x2="50" y2="12"/>
    <line x1="50" y1="94" x2="50" y2="88"/>
    <line x1="6" y1="50" x2="12" y2="50"/>
    <line x1="94" y1="50" x2="88" y2="50"/>
  </g>
  
  <!-- Tiny decorative dots between ticks -->
  <g fill="#d4af37">
    <circle cx="50" cy="8" r="1.5"/>
    <circle cx="50" cy="92" r="1.5"/>
    <circle cx="8" cy="50" r="1.5"/>
    <circle cx="92" cy="50" r="1.5"/>
  </g>
</svg>